<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
    <h3 align="center">Job Application Form</h3>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name">1. Full Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="idno">2. National ID Number:</label>
            <input type="text" id="idno" name="idno" required><br><br>
            <label for="email">3. Email Address:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="phoneNo">4. Phone Number:</label>
            <input type="text" id="phoneNo" name="phoneNo" required><br><br>
            <label for="dob">5. Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>
            <label>6. Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label><br><br>
        </fieldset>
        <fieldset>
            <legend>Job Information</legend>
            <label for="position">7. Position Applied For</label><br>
            <select id="position" name="position" required>
                <option value="">Select a position</option>
                <option value="softwareDev">a. software Developer</option>
                <option value="webDes">b. Web Designer</option>
                <option value="netEng">c. Network Engineer</option>
                <option value="DBadmin">d. Database Administrator</option>
                <option value="ITsup">e. IT Support Officer</option>
            </select><br><br>
            <label for="experience">8. Experience Level</label><br>
            <select id="experience" name="experience" required>
                <option value="">Select experience level</option>
                <option value="fresher"> a. Fresher </option>
                <option value="junior ">b. 1-2 Years </option>
                <option value="mid">c. 3-5 Years </option>
                <option value="senior">d. More Than 5 Years </option>
            </select><br><br>   
        </fieldset>
        <fieldset>
            <legend>Skills</legend>
            <label for="resume">9. Select Technical Skills:</label><br>
            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">a. HTML</label>
            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">b. CSS</label>
            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
            <label for="javascript">c. JavaScript</label>
            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">d. Python</label>
            <input type="checkbox" id="SQ" name="skills" value="SQL">
            <label for="SQL">e. SQL</label>
        </fieldset>
        <fieldset>
            <legend>Educational Information</legend>
            <label for="degree">10. Highest Qualification:</label>
            <select id="degree" name="degree" required>
                <option value="">Select a degree</option>
                <option value="bachelor">a. Bachelor's Degree</option>
                <option value="master">b. Master's Degree</option>
                <option value="phd">c. PhD</option>
            </select><br><br>
            <label for="university">11. University/College Name:</label>
            <input type="text" id="university" name="university" required><br><br>
            <label for="graduationYear">12. Graduation Year:</label>
            <input type="text" id="graduationYear" name="graduationYear" required><br><br>
        </fieldset>
        <fieldset>
            <legend>Additional Information</legend>
            <label for="resume">13. Upload Resume/CV:</label><br>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required><br><br>
            <label for="coverLetter">14. Cover Letter:</label><br>
            <input type="file" id="coverLetter" name="coverLetter" accept=".pdf,.doc,.docx" required><br><br>
            <label for="address">15. Current Address:</label><br>
            <textarea id="address" name="address" rows="5" cols="40" required></textarea><br><br>
        </fieldset>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    
</body>
</html>
